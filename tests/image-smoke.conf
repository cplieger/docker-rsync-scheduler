# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Runs in external-trigger mode (SYNC_INTERVAL=off):
# runExternal() writes the health marker healthy on boot and idles, so no ssh
# remote is contacted. loadConfig() still parses+validates a config and checks
# the ssh_key is readable first, so a committed fixture dir (tests/fixtures,
# bind-mounted read-only at /config via the harness's $SMOKE_DIR) supplies a
# minimal valid config.yaml + dummy smoke_key. Waits for the container
# HEALTHCHECK to report healthy - proving the binary runs on the Alpine base
# (rsync + openssh-client present), the config parses and validates, the ssh_key
# readability check passes, and the file-marker probe works.
SMOKE_APP_NAME=docker-rsync-scheduler
# HEALTHCHECK start-period is 120s; 240 covers it plus two 60s intervals.
SMOKE_TIMEOUT=240
SMOKE_RUN_ARGS="-e SYNC_INTERVAL=off -v ${SMOKE_DIR}/fixtures:/config:ro"
